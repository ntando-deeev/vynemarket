<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create Free Account — VyneMarket</title>





<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="auth.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"/>
</head>
<body>
<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-icon">✦</span><span class="logo-text">VyneMarket</span></a>
  </div>
</nav>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create Free Account</h1>
      <p>List your business and manage listings</p>
    </div>
    <form id="register-form">
      <div class="form-fields">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" placeholder="Your name" required/>
          </div>
          <div class="form-group">
            <label>Country</label>
            <select name="country">
              <option value="">Select…</option>
              <option>South Africa</option><option>Nigeria</option><option>Kenya</option>
              <option>Ghana</option><option>Zimbabwe</option><option>Tanzania</option>
              <option>United States</option><option>United Kingdom</option>
              <option>Canada</option><option>Australia</option><option>India</option>
              <option>UAE</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Business Name (optional)</label>
          <input type="text" name="businessName" placeholder="Your business name"/>
        </div>
        <div class="form-group" style="position:relative">
          <label>Password *</label>
          <input type="password" name="password" id="reg-password-input" placeholder="Min 6 characters" required minlength="6" style="padding-right:44px"/>
          <button type="button" onclick="toggleRegPw()" style="position:absolute;right:14px;top:34px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1.1rem;padding:0" aria-label="Show password">👁</button>
        </div>
        <div class="form-group" id="ref-group" style="display:none">
          <label>Invited by (referral code)</label>
          <input type="text" name="referralCode" id="referralCode" placeholder="e.g. ABC12345" style="font-family:monospace;letter-spacing:0.1em" readonly/>
          <small style="color:var(--brand);font-size:0.78rem" id="ref-by-name"></small>
        </div>
        <div class="form-error" id="reg-error" style="display:none"></div>
        <button type="submit" class="btn-hero-primary" style="width:100%" id="reg-btn">🚀 Create Free Account</button>
        <p style="font-size:0.78rem;color:var(--text-dim);text-align:center">By creating an account you agree to our terms. No credit card required.</p>
      </div>
    </form>
    <div class="auth-switch">
      Already have an account? <a href="/login.html">Sign in →</a>
    </div>
  </div>
</main>
<script>
(function() {
  if (localStorage.getItem('gm_token')) window.location = '/dashboard.html';

  // Auto-detect referral code from URL ?ref=CODE
  const urlParams = new URLSearchParams(window.location.search);
  const refCode = urlParams.get('ref');
  if (refCode) {
    const refGroup = document.getElementById('ref-group');
    const refInput = document.getElementById('referralCode');
    const refName  = document.getElementById('ref-by-name');
    refGroup.style.display = 'block';
    refInput.value = refCode.toUpperCase();
    // Validate the code
    fetch(`/api/referral/validate/${refCode}`)
      .then(r => r.json())
      .then(d => {
        if (d.valid) {
          refName.textContent = `✓ Invited by ${d.referrerName}${d.referrerBusiness ? ' ('+d.referrerBusiness+')' : ''}`;
        } else {
          refName.textContent = 'Invalid referral code';
          refName.style.color = '#EF4444';
        }
      }).catch(()=>{});
  }

  // Password toggle
  window.toggleRegPw = function() {
    const inp = document.getElementById('reg-password-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    document.querySelector('[onclick="toggleRegPw()"]').textContent = inp.type === 'password' ? '👁' : '🙈';
  };

  document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const err = document.getElementById('reg-error');
    btn.disabled = true; btn.innerHTML = '<span class="spin-inline">⟳</span> Creating account…';
    const fd = new FormData(this);
    try {
      const r = await fetch('/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(Object.fromEntries(fd.entries()))
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      localStorage.setItem('gm_token', d.token);
      localStorage.setItem('gm_user', JSON.stringify(d.user));
      btn.innerHTML = '✅ Account created! Redirecting…';
      window.location = '/post-ad.html';
    } catch(ex) {
      err.textContent = ex.message; err.style.display='block';
      btn.disabled=false; btn.innerHTML='🚀 Create Free Account';
    }
  });
})();
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
.spin-inline { display:inline-block; animation: spin 0.7s linear infinite; }
</style>
<script src="/ux.js" defer></script>
</body>
</html>
