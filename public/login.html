<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — VyneMarket</title>





<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="auth.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"/>
</head>
<body>
<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-icon">✦</span><span class="logo-text">VyneMarket</span></a>
  </div>
</nav>
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Sign in to manage your listings</p>
    </div>
    <form id="login-form">
      <div class="form-fields">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group" style="position:relative">
          <label>Password</label>
          <input type="password" name="password" id="password-input" placeholder="Your password" required style="padding-right:44px"/>
          <button type="button" id="pw-toggle" onclick="togglePw()" style="position:absolute;right:14px;top:34px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1.1rem;padding:0" aria-label="Show password">👁</button>
        </div>
        <div style="text-align:right;margin-top:-8px">
          <a href="#" onclick="showForgotModal()" style="font-size:0.82rem;color:var(--brand)">Forgot password?</a>
        </div>
        <div class="form-error" id="login-error" style="display:none"></div>
        <button type="submit" class="btn-hero-primary" style="width:100%" id="login-btn">Sign In</button>
      </div>
    </form>
    <div class="auth-switch">
      Don't have an account? <a href="/register.html">Create one free →</a>
    </div>
    <div class="auth-divider">or continue as guest</div>
    <div style="text-align:center">
      <a href="/post-ad.html" class="btn-ghost">List Your Business Without Account</a>
    </div>
  </div>
</main>
<script>
(function() {
  if (localStorage.getItem('gm_token')) window.location = '/dashboard.html';

  // Password toggle
  window.togglePw = function() {
    const inp = document.getElementById('password-input');
    const btn = document.getElementById('pw-toggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  };

  // Forgot password modal
  window.showForgotModal = function() {
    const email = document.querySelector('[name="email"]').value || '';
    const msg = prompt('Enter your email address and we\'ll send a reset link:', email);
    if (!msg) return;
    fetch('/api/auth/forgot-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: msg})
    }).then(r => r.json()).then(d => {
      alert(d.message || 'If that email exists, a reset link has been sent.');
    }).catch(() => alert('Check your email inbox for a reset link.'));
  };

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    btn.disabled = true; btn.innerHTML = '<span class="spin-inline">⟳</span> Signing in…';
    const fd = new FormData(this);
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(Object.fromEntries(fd.entries()))
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      localStorage.setItem('gm_token', d.token);
      localStorage.setItem('gm_user', JSON.stringify(d.user));
      btn.innerHTML = '✅ Redirecting…';
      window.location = '/dashboard.html';
    } catch(ex) {
      err.textContent = ex.message; err.style.display='block';
      btn.disabled=false; btn.innerHTML='Sign In';
    }
  });
})();
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
.spin-inline { display:inline-block; animation: spin 0.7s linear infinite; }
</style>
<script src="/ux.js" defer></script>
</body>
</html>
