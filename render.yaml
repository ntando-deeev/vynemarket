services:
  - type: web
    name: vynemarket
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: vynemarket-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /api/stats
