services:
  - type: web
    name: vynemarket
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: UPLOADS_DIR
        value: /data/uploads
    healthCheckPath: /api/stats
