services:
  - type: web
    name: growthmarket
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/data
      - key: UPLOADS_DIR
        value: /opt/render/project/uploads
    disk:
      name: growthmarket-data
      mountPath: /opt/render/project
      sizeGB: 5
